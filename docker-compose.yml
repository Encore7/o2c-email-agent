services:
  postgres:
    image: postgres:16-alpine
    container_name: o2c-postgres
    environment:
      POSTGRES_DB: o2c
      POSTGRES_USER: o2c
      POSTGRES_PASSWORD: o2c
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U o2c -d o2c"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: ./backend
    container_name: o2c-backend
    env_file:
      - ./backend/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: o2c-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

  simulator:
    build:
      context: ./simulator
    container_name: o2c-simulator
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    profiles: ["simulator"]

volumes:
  postgres_data:
